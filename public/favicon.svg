<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Signage "Beacon" favicon: a static frame of the PixelAccent dot grid.
       Ink field (#16150f) + signal-yellow dots (#f4c500). -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.7" />
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#16150f" />
  <g fill="#f4c500">
    <!-- soft glow layer -->
    <g filter="url(#glow)" opacity="0.5">
      <circle cx="7.75" cy="7.75" r="2" />
      <circle cx="18.75" cy="7.75" r="2" />
      <circle cx="13.25" cy="13.25" r="2" />
      <circle cx="24.25" cy="13.25" r="2" />
      <circle cx="7.75" cy="18.75" r="2" />
      <circle cx="18.75" cy="18.75" r="2" />
      <circle cx="24.25" cy="18.75" r="2" />
      <circle cx="13.25" cy="24.25" r="2" />
    </g>
    <!-- crisp dots; a couple dimmed to echo the living "fade" state -->
    <circle cx="7.75" cy="7.75" r="2" />
    <circle cx="18.75" cy="7.75" r="2" opacity="0.55" />
    <circle cx="13.25" cy="13.25" r="2" />
    <circle cx="24.25" cy="13.25" r="2" />
    <circle cx="7.75" cy="18.75" r="2" />
    <circle cx="18.75" cy="18.75" r="2" />
    <circle cx="24.25" cy="18.75" r="2" opacity="0.55" />
    <circle cx="13.25" cy="24.25" r="2" />
  </g>
</svg>
