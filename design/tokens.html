<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Helvetica Neue", Helvetica, "Noto Sans JP", Arial, sans-serif;
      }
    </style>
  </head>
  <body class="bg-neutral-50 p-8 text-black">
    <h2 class="mb-4 text-lg font-bold">Color</h2>
    <div class="grid grid-cols-2 gap-4 sm:grid-cols-5">
      <div>
        <div class="h-16 rounded border border-black/10" style="background:#f4c500"></div>
        <p class="mt-1 text-xs font-bold">Exit yellow</p>
        <p class="text-xs text-black/50">#f4c500</p>
      </div>
      <div>
        <div class="h-16 rounded" style="background:#181717"></div>
        <p class="mt-1 text-xs font-bold">GitHub</p>
        <p class="text-xs text-black/50">#181717</p>
      </div>
      <div>
        <div class="h-16 rounded" style="background:#0a66c2"></div>
        <p class="mt-1 text-xs font-bold">LinkedIn</p>
        <p class="text-xs text-black/50">#0a66c2</p>
      </div>
      <div>
        <div class="h-16 rounded" style="background:#e60012"></div>
        <p class="mt-1 text-xs font-bold">Email red</p>
        <p class="text-xs text-black/50">#e60012</p>
      </div>
      <div>
        <div class="h-16 rounded" style="background:#000"></div>
        <p class="mt-1 text-xs font-bold">Ink</p>
        <p class="text-xs text-black/50">#000000</p>
      </div>
    </div>

    <h2 class="mt-8 mb-2 text-lg font-bold">Type — Helvetica Neue</h2>
    <p class="text-4xl font-bold tracking-tight">Dillon Hamilton</p>
    <p class="text-base font-bold text-black/70">Software Engineer</p>
    <p class="text-xs font-bold tracking-widest text-black/60 uppercase">Eyebrow label</p>
  </body>
</html>
