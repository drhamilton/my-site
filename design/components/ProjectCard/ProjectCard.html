<!-- @dsCard group="Components" name="Project card" subtitle="frontend demo · server terminal" viewport="1120x680" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../../styles.css" />
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script src="../../_ds_bundle.js"></script>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: var(--sig-font-display); color: var(--sig-ink); background: var(--sig-grid); padding: 32px; }
      .eyebrow { font-family: var(--sig-font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(22,21,15,0.55); margin: 0 0 4px; }
      h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 22px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 26px; align-items: start; }
      .term { background: #16150f; padding: 14px 16px; font-family: var(--sig-font-mono); font-size: 12.5px; line-height: 1.65; color: rgba(255,255,255,0.82); }
      .term .bar { display: flex; justify-content: space-between; gap: 12px; white-space: nowrap; border-bottom: 1px solid rgba(255,255,255,0.14); padding-bottom: 8px; margin-bottom: 10px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
      .term .mut { color: rgba(255,255,255,0.45); }
      .term .y { color: #f4c500; } .term .g { color: #54d98a; }
    </style>
  </head>
  <body>
    <p class="eyebrow">DH/SIG · component</p>
    <h1>Project card</h1>
    <div id="root"></div>
    <script type="text/babel">
      const { ProjectCard } = window.MySiteSignage_7f4c16;
      function Demo() {
        return (
          <div className="grid">
            <ProjectCard
              code="P01" type="frontend" title="Ledger"
              description="A personal-finance dashboard — accounts, budgets, and cash-flow forecasting with interactive charts."
              tech="React, TypeScript, D3, Vite"
              paneLabel="demo · 1440 × 900"
              liveHref="#" repoHref="#"
            />
            <ProjectCard
              code="P02" type="server" title="Relay"
              description="A realtime message gateway — fan-out pub/sub over WebSockets with back-pressure and at-least-once delivery."
              tech="Go, Redis, gRPC, Docker"
              repoHref="#" docsHref="#"
            >
              <div className="term">
                <div className="bar"><span>relay · stdout</span><span>running</span></div>
                <div><span className="mut">▸</span> relay --listen <span className="y">:8080</span></div>
                <div><span className="g">●</span> node-a <span className="mut">connected</span></div>
                <div><span className="mut">→</span> fan-out <span className="y">12,480</span> msg/s</div>
                <div><span className="mut">ack p99</span> <span className="g">4.2ms</span> <span className="mut">· 0 dropped</span></div>
              </div>
            </ProjectCard>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
    </script>
  </body>
</html>
